server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Repassa a API para o backend na mesma origem, evitando CORS - o
    # browser so fala com a porta do frontend.
    location /api/ {
        proxy_pass http://backend:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # SPA: qualquer rota desconhecida cai no index.html (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
